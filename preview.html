<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BrahmaOS - Local Server Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #1e1e2e, #11111b); overflow: hidden; color: white; }
    .window { position: absolute; background: rgba(30, 30, 46, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; }
    .titlebar { height: 40px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 16px; cursor: move; user-select: none; }
    .content { flex: 1; padding: 24px; overflow-y: auto; background: rgba(0,0,0,0.2); }
    .btn { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; cursor: pointer; }
    .close-btn { background: #ef4444; } .min-btn { background: #eab308; } .max-btn { background: #22c55e; }
  </style>
</head>
<body>
  <div id="desktop" class="p-6 flex flex-wrap gap-6">
    <div onclick="openApp('about', 'About Me')" class="flex flex-col items-center gap-2 w-24 p-2 rounded-xl hover:bg-white/10 cursor-pointer">
      <div class="w-16 h-16 bg-black/30 border border-white/20 rounded-2xl flex items-center justify-center text-4xl shadow-lg">👤</div>
      <span class="text-sm font-medium">About Me</span>
    </div>
    <div onclick="openApp('projects', 'Projects')" class="flex flex-col items-center gap-2 w-24 p-2 rounded-xl hover:bg-white/10 cursor-pointer">
      <div class="w-16 h-16 bg-black/30 border border-white/20 rounded-2xl flex items-center justify-center text-4xl shadow-lg">💼</div>
      <span class="text-sm font-medium">Projects</span>
    </div>
    <div onclick="openApp('terminal', 'Terminal')" class="flex flex-col items-center gap-2 w-24 p-2 rounded-xl hover:bg-white/10 cursor-pointer">
      <div class="w-16 h-16 bg-black/30 border border-white/20 rounded-2xl flex items-center justify-center text-4xl shadow-lg">💻</div>
      <span class="text-sm font-medium">Terminal</span>
    </div>
  </div>

  <div id="taskbar" class="absolute bottom-6 left-1/2 -translate-x-1/2 h-16 bg-black/50 backdrop-blur-2xl rounded-2xl border border-white/20 shadow-2xl flex items-center px-4 gap-4 z-[9999]">
    <div onclick="openApp('about', 'About Me')" class="w-12 h-12 rounded-xl flex items-center justify-center cursor-pointer hover:bg-white/10 text-2xl">👤</div>
    <div onclick="openApp('projects', 'Projects')" class="w-12 h-12 rounded-xl flex items-center justify-center cursor-pointer hover:bg-white/10 text-2xl">💼</div>
    <div onclick="openApp('terminal', 'Terminal')" class="w-12 h-12 rounded-xl flex items-center justify-center cursor-pointer hover:bg-white/10 text-2xl">💻</div>
  </div>

  <div id="windows-container"></div>

  <script>
    let zIndexCounter = 10;
    
    function bringToFront(win) {
      zIndexCounter++;
      win.style.zIndex = zIndexCounter;
    }

    function closeApp(id) {
      const win = document.getElementById('window-' + id);
      if (win) win.remove();
    }

    function toggleMaximize(id) {
      const win = document.getElementById('window-' + id);
      if (!win) return;
      if (win.dataset.maximized === 'true') {
        win.dataset.maximized = 'false';
        win.style.width = '700px'; win.style.height = '500px'; win.style.top = '100px'; win.style.left = '100px';
      } else {
        win.dataset.maximized = 'true';
        win.style.width = 'calc(100vw - 32px)'; win.style.height = 'calc(100vh - 120px)'; win.style.top = '16px'; win.style.left = '16px';
      }
    }

    async function openApp(id, title) {
      const existingWin = document.getElementById('window-' + id);
      if (existingWin) { bringToFront(existingWin); return; }

      const win = document.createElement('div');
      win.id = 'window-' + id;
      win.className = 'window';
      win.style.width = '700px'; win.style.height = '500px';
      win.style.left = Math.floor(Math.random() * 100 + 50) + 'px';
      win.style.top = Math.floor(Math.random() * 100 + 50) + 'px';
      bringToFront(win);
      win.onmousedown = () => bringToFront(win);

      let contentHtml = '<div class="animate-pulse">Loading data from temporary server...</div>';
      
      win.innerHTML = `
        <div class="titlebar" id="titlebar-${id}">
          <div class="flex items-center gap-1.5 mr-4">
            <div class="btn close-btn" onclick="closeApp('${id}')"></div>
            <div class="btn min-btn"></div>
            <div class="btn max-btn" onclick="toggleMaximize('${id}')"></div>
          </div>
          <div class="flex-1 text-center text-sm font-medium text-white/80 pr-[72px] pointer-events-none">${title}</div>
        </div>
        <div class="content" id="content-${id}">${contentHtml}</div>
      `;
      document.getElementById('windows-container').appendChild(win);

      // Fetch Data
      const contentDiv = document.getElementById('content-' + id);
      try {
        if (id === 'about') {
          const res = await fetch('/api/config/about');
          const data = await res.json();
          contentDiv.innerHTML = `
            <h1 class="text-3xl font-bold text-[#cba6f7] mb-6">About Me</h1>
            <p class="text-lg text-gray-300 leading-relaxed mb-6">${data.bio}</p>
            <h2 class="text-xl font-semibold mb-3">Skills</h2>
            <div class="flex flex-wrap gap-2">
              ${data.skills.split(',').map(s => `<span class="px-4 py-1.5 bg-white/10 rounded-full text-sm border border-white/20">${s.trim()}</span>`).join('')}
            </div>
          `;
        } else if (id === 'projects') {
          const res = await fetch('/api/projects');
          const projects = await res.json();
          contentDiv.innerHTML = '<div class="grid grid-cols-2 gap-6">' + projects.map(p => `
            <div class="bg-white/5 border border-white/10 rounded-xl p-5 hover:bg-white/10 transition-colors">
              <h3 class="text-xl font-semibold text-[#cba6f7] mb-2 flex items-center gap-2">📁 ${p.title}</h3>
              <p class="text-gray-400 text-sm mb-4">${p.description}</p>
            </div>
          `).join('') + '</div>';
        } else if (id === 'terminal') {
          contentDiv.innerHTML = `
            <div class="font-mono text-sm h-full flex flex-col text-green-400">
              <div class="flex-1 overflow-y-auto space-y-2 pb-4" id="terminal-history">
                <div class="text-gray-300">BrahmaOS Terminal (Connected to Temp Server)</div>
              </div>
              <div class="flex items-center gap-2 mt-auto border-t border-white/10 pt-4">
                <span>root@brahma-os:~$</span>
                <input type="text" id="terminal-input" class="flex-1 bg-transparent border-none outline-none text-white focus:ring-0" autofocus autocomplete="off" />
              </div>
            </div>
          `;
          const input = document.getElementById('terminal-input');
          const history = document.getElementById('terminal-history');
          input.onkeydown = (e) => {
            if (e.key === 'Enter') {
              const cmd = input.value.trim();
              history.innerHTML += \`<div class="text-green-400">root@brahma-os:~$ \${cmd}</div>\`;
              if (cmd === 'help') history.innerHTML += \`<div class="text-gray-300">Commands: help, clear, ping</div>\`;
              else if (cmd === 'ping') history.innerHTML += \`<div class="text-gray-300">Pong! Temp Server is ALIVE.</div>\`;
              else if (cmd === 'clear') history.innerHTML = '';
              else if (cmd) history.innerHTML += \`<div class="text-red-400">Command not found: \${cmd}</div>\`;
              input.value = ''; history.scrollTop = history.scrollHeight;
            }
          };
        }
      } catch (err) {
        contentDiv.innerHTML = '<div class="text-red-400">Error connecting to local server api. Ensure the backend is running.</div>';
      }

      // Dragging Logic
      const titlebar = document.getElementById('titlebar-' + id);
      let isDragging = false;
      let offsetX, offsetY;

      titlebar.addEventListener('mousedown', (e) => {
        if(e.target.classList.contains('btn') || win.dataset.maximized === 'true') return;
        isDragging = true;
        offsetX = e.clientX - win.offsetLeft;
        offsetY = e.clientY - win.offsetTop;
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        win.style.left = (e.clientX - offsetX) + 'px';
        win.style.top = (e.clientY - offsetY) + 'px';
      });

      document.addEventListener('mouseup', () => { isDragging = false; });
    }
  </script>
</body>
</html>
